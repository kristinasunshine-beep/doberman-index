<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="hero-image"><h1 id="name"></h1></div>

<div class="container">

<div>
<h2>Genetics</h2>
<div id="genetics"></div>
</div>

<div>
<h2>Reproduction</h2>
<p id="repro"></p>
</div>

</div>

<script>

const id = new URLSearchParams(location.search).get("id");

Promise.all([
fetch("dogs.json").then(r=>r.json()),
fetch("litters.json").then(r=>r.json())
]).then(([dogs, litters])=>{

const dog = dogs.find(d=>d.id===id);

document.getElementById("name").innerText = dog.name;
document.querySelector(".hero-image").style.backgroundImage = `url(${dog.image})`;

dog.genetics.forEach(g=>{
  let s = document.createElement("span");
  s.innerText = g;
  document.getElementById("genetics").appendChild(s);
});

document.getElementById("repro").innerText =
"Litters: " + dog.litters;

});

</script>

</body>
</html>
