<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tools</title>

<style>
body{
  font-family:'Barlow Condensed';
  padding:40px;
}

.tool{
  border-bottom:1px solid #ccc;
  padding:30px 0;
}

button{
  padding:10px 20px;
  border:1px solid black;
  background:none;
  cursor:pointer;
}

button:hover{
  border-color:#d6b600;
  color:#d6b600;
}
</style>
</head>

<body>

<h1>Breeder Tools</h1>

<div class="tool">
  <h2>AI Breeding Report</h2>
  <button>Generate</button>
</div>

<div class="tool">
  <h2>Stud Promotion Kit</h2>
  <button>Create</button>
</div>

<div class="tool">
  <h2>Kennel Presentation PDF</h2>
  <button>Generate</button>
</div>

</body>
</html>
