<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stud Dog</title>

<style>
body{
  background:#0a0a0a;
  color:#fff;
  font-family:Inter;
  padding:40px;
}

.section{
  margin-bottom:40px;
}

h2{
  margin-bottom:10px;
}

.badges span{
  display:inline-block;
  padding:6px 10px;
  border:1px solid rgba(255,255,255,0.2);
  margin:5px;
  font-size:12px;
}

/* AI BUTTONS */

.ai{
  margin-top:20px;
}

.ai button{
  margin:5px;
  padding:10px 15px;
  background:none;
  border:1px solid rgba(255,255,255,0.2);
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>Dion Dante</h1>

<div class="section">
  <h2>Genetic Summary</h2>
  <div class="badges">
    <span>DM: Clear</span>
    <span>DCM1: Carrier</span>
    <span>HD: A</span>
    <span>vWD: Clear</span>
  </div>
</div>

<div class="section">
  <h2>Performance</h2>
  <p>IPO1, CAC, CACIB</p>
</div>

<div class="section">
  <h2>Reproduction</h2>
  <p>12 litters / 78 puppies / 9 champions</p>
</div>

<div class="section">
  <h2>AI Actions</h2>
  <div class="ai">
    <button>Generate Stud PDF</button>
    <button>Create Promo Kit</button>
    <button>Match With Female</button>
  </div>
</div>

</body>
</html>
