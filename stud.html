<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stud Dog</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;600;800&display=swap" rel="stylesheet">

<style>

/* RESET */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* BODY */

body{
  font-family:'Barlow Condensed', sans-serif;
  background:white;
  color:black;
}

/* DOT GRID */

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background-image:radial-gradient(#dcdcdc 1px, transparent 1px);
  background-size:20px 20px;
  z-index:-1;
}

/* CURSOR */

.cursor{
  width:18px;
  height:18px;
  border:2px solid #d6b600;
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  transform:translate(-50%, -50%);
}

/* HERO IMAGE */

.hero{
  height:80vh;
  background:url('dante.jpg') center/cover no-repeat;
  display:flex;
  align-items:flex-end;
  padding:60px;
  color:white;
  position:relative;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.7), transparent);
}

.hero-content{
  position:relative;
  z-index:2;
}

.hero h1{
  font-size:90px;
}

.hero p{
  font-size:20px;
}

/* GRID */

.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:60px;
  padding:80px 60px;
}

/* SECTION */

.section{
  margin-bottom:40px;
}

.section h2{
  font-size:32px;
  margin-bottom:15px;
}

/* BADGES */

.badges span{
  display:inline-block;
  padding:8px 12px;
  border:1px solid #000;
  margin:5px;
  font-size:14px;
}

/* STATS */

.stats{
  display:flex;
  gap:40px;
  margin-top:10px;
}

.stat{
  font-size:28px;
}

/* AI */

.ai{
  margin-top:20px;
}

.ai button{
  margin:5px;
  padding:12px 18px;
  border:1px solid black;
  background:none;
  cursor:pointer;
  font-size:14px;
}

.ai button:hover{
  border-color:#d6b600;
  color:#d6b600;
}

/* BACK */

.back{
  padding:30px 60px;
}

.back a{
  text-decoration:none;
  color:black;
}

</style>
</head>

<body>

<div class="cursor"></div>

<div class="back">
  <a href="studs.html">← Back to Stud Dogs</a>
</div>

<!-- HERO -->

<section class="hero">
  <div class="hero-content">
    <h1>DION DANTE</h1>
    <p>3y • Serbia • Available for Stud</p>
  </div>
</section>

<!-- CONTENT -->

<section class="container">

  <!-- LEFT -->

  <div>

    <div class="section">
      <h2>Genetic Profile</h2>
      <div class="badges">
        <span>DM: Clear</span>
        <span>DCM1: Carrier</span>
        <span>DCM2: Clear</span>
        <span>vWD: Clear</span>
        <span>HD: A</span>
        <span>ED: 0</span>
      </div>
    </div>

    <div class="section">
      <h2>Performance</h2>
      <p>IPO1 • CAC • CACIB</p>
    </div>

    <div class="section">
      <h2>Bloodline</h2>
      <p>European working lineage</p>
    </div>

  </div>

  <!-- RIGHT -->

  <div>

    <div class="section">
      <h2>Reproduction</h2>
      <div class="stats">
        <div class="stat">12 Litters</div>
        <div class="stat">78 Puppies</div>
        <div class="stat">9 Champions</div>
      </div>
    </div>

    <div class="section">
      <h2>AI Tools</h2>
      <div class="ai">
        <button>Generate Stud PDF</button>
        <button>Create Promo Kit</button>
        <button>Match With Female</button>
      </div>
    </div>

  </div>

</section>

<script>

/* CURSOR */

const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove", e => {
  cursor.style.top = e.clientY + "px";
  cursor.style.left = e.clientX + "px";
});

</script>

</body>
</html>
